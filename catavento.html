<!DOCTYPE html><html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <title>Painel de Aprendizado Premium</title>
    <style>
        :root { color-scheme: light dark; --bg-color: #0b111e; --accent-color: #1e90ff; }
        body, html { margin: 0; padding: 0; background-color: var(--bg-color) !important; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .painel-jogo { width: 98vw; height: 95vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box; padding: 10px; }
        .menu-categorias { display: flex; gap: 10px; width: 100%; max-width: 1200px; justify-content: center; overflow-x: auto; padding: 10px; scrollbar-width: none; }
        .menu-categorias::-webkit-scrollbar { display: none; }
        .btn-categoria { padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #fff; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .btn-categoria.ativo, .btn-categoria:hover { background: var(--accent-color); border-color: var(--accent-color); box-shadow: 0 0 15px rgba(30,144,255,0.4); }
        .area-horizontal { display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 3vw; flex: 1; width: 100%; max-width: 1400px; overflow-x: auto; padding: 20px; box-sizing: border-box; scroll-behavior: smooth; scrollbar-width: none; }
        .area-horizontal::-webkit-scrollbar { display: none; }
        .item-card { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.02); border-radius: 50%; transition: transform 0.2s, background 0.2s, border-color 0.2s; user-select: none; backdrop-filter: blur(15px); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4); width: 20vw; height: 20vw; min-width: 180px; min-height: 180px; flex-shrink: 0; box-sizing: border-box; position: relative; gap: 10px; }
        .item-card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.05); border-color: var(--accent-color); }
        .item-card:active { transform: scale(0.95); }
        .item-icone { width: 100%; height: 60%; display: flex; align-items: center; justify-content: center; }
        .item-nome { font-size: 1.5vw; font-weight: bold; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1px; text-align: center; max-width: 85%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .controles-navegacao { display: flex; gap: 20px; margin-bottom: 10px; }
        .btn-nav { width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .btn-nav:hover { background: rgba(255,255,255,0.15); }

        @media (max-width: 768px) {
            .area-horizontal { gap: 5vw; padding: 10px; justify-content: flex-start; }
            .item-card { width: 45vw; height: 45vw; min-width: 140px; min-height: 140px; }
            .item-nome { font-size: 4vw; }
            .btn-categoria { padding: 10px 18px; font-size: 14px; }
            .menu-categorias { justify-content: flex-start; padding-left: 10px; padding-right: 10px; }
        }
    </style></head><body>
    <div class="painel-jogo">
        <div class="menu-categorias" id="menuCategorias"></div>
        <div class="area-horizontal" id="areaElementos"></div>
        <div class="controles-navegacao">
            <button class="btn-nav" onclick="scrollGrade(-1)">&larr;</button>
            <button class="btn-nav" onclick="scrollGrade(1)">&rarr;</button>
        </div>
    </div>
    <script>
        const bancoDados = {
            cozinha: [
                {n: "Avental", i: "https://drive.google.com/thumbnail?sz=w500&id=1V_NKFvDhErQCmmK_pj1aadC4ZRa69Vo7"},
                {n: "Batedeira", i: "https://drive.google.com/thumbnail?sz=w500&id=1NIzFK7eIW-mPuaTPCrdhTHyHkn83ivmw"},
                {n: "Bule", i: "https://drive.google.com/thumbnail?sz=w500&id=1uAzUcMYnHx93ui83bHjK9ux_-vE5Ui1z"},
                {n: "Garfo", i: "https://drive.google.com/thumbnail?sz=w500&id=1dUam8-acA1gedzVO_l1j743H19ViZoPc"},
                {n: "Colher", i: "https://drive.google.com/thumbnail?sz=w500&id=1pAXHqwqhLUq5lCzxjOmbEuBEoh2e9EWy"},
                {n: "Concha", i: "https://drive.google.com/thumbnail?sz=w500&id=1l27KMourY-jfynRrFSVqimpex5CtpSzr"},
                {n: "Copo", i: "https://drive.google.com/thumbnail?sz=w500&id=1BZKZQChiZMPqxutjO17Uk5C-jKTLkfZh"},
                {n: "Esponja", i: "https://drive.google.com/thumbnail?sz=w500&id=1H37EN6A1tN9WcewcCafhA0I-GhOnEcyg"},
                {n: "Faca", i: "https://drive.google.com/thumbnail?sz=w500&id=19tCUvAUdecLyXLdI3jmLOMNY6uHcnQCI"},
                {n: "Fogão", i: "https://drive.google.com/thumbnail?sz=w500&id=1bp9v6CJc95-FHl0ccikohmS78N-xlahx"},
                {n: "Frigideira", i: "https://drive.google.com/thumbnail?sz=w500&id=14S6twfLxpEzeEmu0LQUZ7oDQRNb64LtL"},
                {n: "Geladeira", i: "https://drive.google.com/thumbnail?sz=w500&id=1uA23JoG1XBhKwWaFCYDwzURnM9TuLZCp"},
                {n: "Liquidificador", i: "https://drive.google.com/thumbnail?sz=w500&id=1FTY9eoNLZqNyBqFrrL8k7ORLvifWf-Jr"},
                {n: "Micro-ondas", i: "https://drive.google.com/thumbnail?sz=w500&id=1JUQNUNRLsbO_l26H-9CxBOnNus2Bpvx1"},
                {n: "Panela", i: "https://drive.google.com/thumbnail?sz=w500&id=1YTe9VYgG2HLycmisyzHjvmnrpsZrmEjQ"},
                {n: "Pano de Prato", i: "https://drive.google.com/thumbnail?sz=w500&id=1YT9sC6TD3u8kif01Kk4MT1M93LO5UXRL"}
            ]
        };
        let categoriaAtual = "cozinha";
        let vozesDisponiveis = [];

        function carregarVozes() {
            if ('speechSynthesis' in window) {
                vozesDisponiveis = window.speechSynthesis.getVoices();
            }
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = carregarVozes;
            carregarVozes();
        }

        function obterMelhorVoz() {
            const vozesPt = vozesDisponiveis.filter(v => v.lang.startsWith('pt'));
            const prioridades = ["natural", "google", "neural", "maria", "luciana", "francisca"];
            for (const termo of prioridades) {
                const vozSeleta = vozesPt.find(v => v.name.toLowerCase().includes(termo));
                if (vozSeleta) return vozSeleta;
            }
            return vozesPt.find(v => v.name.toLowerCase().includes("female")) || vozesPt[0] || null;
        }

        function renderizarMenu() {
            const menu = document.getElementById("menuCategorias");
            menu.innerHTML = "";
            Object.keys(bancoDados).forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `btn-categoria ${cat === categoriaAtual ? 'ativo' : ''}`;
                btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.onclick = () => alternarPagina(cat);
                menu.appendChild(btn);
            });
        }
        function renderizarElementos() {
            const area = document.getElementById("areaElementos");
            area.innerHTML = "";
            bancoDados[categoriaAtual].forEach(item => {
                if (item.i.startsWith("http")) {
                    const card = document.createElement("div");
                    card.className = "item-card";
                    card.onclick = () => falarItem(item.n);
                    const icone = document.createElement("div");
                    icone.className = "item-icone";
                    const img = document.createElement("img");
                    img.src = item.i;
                    img.style.width = "70%";
                    img.style.height = "70%";
                    img.style.objectFit = "contain";
                    img.style.borderRadius = "50%";
                    icone.appendChild(img);
                    const nome = document.createElement("div");
                    nome.className = "item-nome";
                    nome.textContent = item.n;
                    card.appendChild(icone);
                    card.appendChild(nome);
                    area.appendChild(card);
                }
            });
            area.scrollLeft = 0;
        }
        function falarItem(texto) {
            if ('speechSynthesis' in window) {
                try {
                    window.speechSynthesis.cancel();
                    setTimeout(() => {
                        const utterance = new SpeechSynthesisUtterance(texto);
                        utterance.lang = 'pt-BR';
                        utterance.rate = 0.90;
                        utterance.pitch = 1.05;
                        const melhorVoz = obterMelhorVoz();
                        if (melhorVoz) utterance.voice = melhorVoz;
                        window.speechSynthesis.speak(utterance);
                    }, 20);
                } catch(e) { console.error("Erro na síntese de voz:", e); }
            }
        }
        function alternarPagina(novaCategoria) {
            categoriaAtual = novaCategoria;
            renderizarMenu();
            renderizarElementos();
            falarItem(novaCategoria);
        }
        function scrollGrade(direcao) {
            const area = document.getElementById("areaElementos");
            const deslocamento = window.innerWidth * (window.innerWidth <= 768 ? 0.80 : 0.45);
            area.scrollLeft += (direcao * deslocamento);
        }
        renderizarMenu();
        renderizarElementos();
    </script></body></html>
